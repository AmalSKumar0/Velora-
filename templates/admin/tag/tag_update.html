{% extends "admin/base.html" %}
{% load static %}

{% block title %}Admin Dashboard | Velora Digital Art{% endblock %}
{% block content %}
<h2>Edit Tag</h2>

<form method="POST">
    {% csrf_token %}
    <input type="text" name="name" value="{{ tag.name }}" required>
    <button type="submit">Update</button>
</form>

<a href="{% url 'tag_list' %}">Back</a>
{% endblock %}
