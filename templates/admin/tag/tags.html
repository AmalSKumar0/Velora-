{% extends "admin/base.html" %}
{% load static %}

{% block title %}Admin Dashboard | Velora Digital Art{% endblock %}
{% block content %}
<h2>Tags</h2>

<form method="POST">
    {% csrf_token %}
    <input type="text" name="name" placeholder="Enter tag name" required>
    <button type="submit">Add Tag</button>
</form>

<hr>

<table border="1" cellpadding="10">
    <tr>
        <th>Name</th>
        <th>Actions</th>
    </tr>

    {% for tag in tags %}
    <tr>
        <td>{{ tag.name }}</td>
        <td>
            <a href="{% url 'tag_update' tag.id %}">Edit</a>
            <a href="{% url 'tag_delete' tag.id %}">Delete</a>
        </td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="2">No tags found</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
