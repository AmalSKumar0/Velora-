{% extends "admin/base.html" %}
{% load static %}

{% block title %}Admin Dashboard | Velora Digital Art{% endblock %}
{% block content %}
<h2>Delete Tag</h2>

<p>Are you sure you want to delete "{{ tag.name }}"?</p>

<form method="POST">
    {% csrf_token %}
    <button type="submit">Yes, Delete</button>
</form>

<a href="{% url 'tag_list' %}">Cancel</a>
{% endblock %}
