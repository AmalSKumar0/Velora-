{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Velora - Artist Dashboard</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat+Brush&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            display: ['"Caveat Brush"', 'cursive'],
          }
        }
      }
    }
  </script>

<style>\n    html { font-size: 13px; }\n
   .tab-content { display: none; opacity: 0; transform: translateY(10px); transition: all 0.2s ease-out; }
    .tab-content.active { display: block; opacity: 1; transform: translateY(0); }
    
    .modal-overlay { display: none; opacity: 0; transition: opacity 0.2s ease-out; }
    .modal-overlay.active { display: flex; opacity: 1; }
    .modal-content { transform: scale(0.95) translateY(20px); opacity: 0; transition: all 0.2s ease-out; }
    .modal-overlay.active .modal-content { transform: scale(1) translateY(0); opacity: 1; }
    .motion-trigger { opacity: 0; transform: translateY(20px); transition: all 0.4s ease-out; }
    .motion-visible { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body class="min-h-screen bg-[#fffdf8] font-sans text-gray-900 selection:bg-[#ffc86b] selection:text-black flex flex-col lg:flex-row relative">
  
  {% include 'includes/message.html' %}

  <header class="bg-[#ffc86b] flex flex-col py-4 lg:py-10 px-6 w-full lg:w-72 lg:h-screen border-b-[3px] lg:border-b-0 lg:border-r-[3px] border-black sticky top-0 z-50 shrink-0">
    
    <div class="flex items-center justify-between w-full lg:justify-start">
      <a href="/" class="flex items-center gap-2 font-display text-3xl tracking-wide lg:px-2">
        <div class="w-8 h-8 rounded-full border-[3px] border-black flex items-center justify-center bg-white shrink-0">
           <i data-lucide="brush" class="w-4 h-4 text-black"></i>
        </div>
        VELORA
      </a>
      
      <button id="mobile-menu-btn" class="lg:hidden w-12 h-12 flex items-center justify-center bg-white border-[3px] border-black rounded-xl shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] active:shadow-none active:translate-x-[4px] active:translate-y-[4px] transition-all">
        <i id="menu-icon" data-lucide="menu" class="w-6 h-6 stroke-[3px]"></i>
      </button>
    </div>

    <div id="retractable-menu" class="hidden absolute top-full left-0 w-full bg-[#ffc86b] border-b-[3px] border-black p-6 flex-col gap-8 lg:static lg:flex lg:flex-col lg:p-0 lg:border-none lg:mt-10 lg:h-full lg:w-full shadow-2xl lg:shadow-none z-40">
      
      <nav class="flex flex-col gap-4 w-full">
        <a href="/" class="px-5 py-4 lg:py-4 rounded-2xl font-bold text-lg lg:text-base border-[3px] transition-all text-left border-transparent hover:border-black/20 flex items-center gap-3">
          <i data-lucide="layout-dashboard" class="w-6 h-6 lg:w-5 lg:h-5"></i> Dashboard
        </a>
        
        <a href="{% url 'view_my_work' %}" class="px-5 py-4 lg:py-4 rounded-2xl font-bold text-lg lg:text-base border-[3px] transition-all text-left border-black bg-white shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] flex items-center gap-3">
          <i data-lucide="folder-kanban" class="w-6 h-6 lg:w-5 lg:h-5"></i> My Works
        </a>
      </nav>

      <div class="mt-auto flex items-center justify-between bg-white border-[3px] border-black rounded-2xl p-4 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] w-full">
        <div class="flex items-center gap-3">
          <div class="w-12 h-12 lg:w-10 lg:h-10 rounded-full border-[3px] border-black bg-white overflow-hidden shrink-0 flex items-center justify-center">
             <img src="https://api.dicebear.com/7.x/shapes/svg?seed={{ request.user.username|default:'Artist' }}" alt="Profile" class="w-full h-full object-cover" />
          </div>
          <div>
            <div class="font-bold text-base lg:text-sm truncate max-w-[120px] lg:max-w-[100px]">{{ request.user.username|default:'Artist' }}</div>
            <div class="text-xs font-black text-[#ffc86b] uppercase tracking-wider" style="text-shadow: 1px 1px 0 #000;">Artist</div>
          </div>
        </div>

        <a href="{% url 'logout' %}" class="bg-gray-100 hover:bg-red-400 hover:text-white border-[2px] border-black rounded-lg w-10 h-10 lg:w-8 lg:h-8 flex items-center justify-center transition-colors shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] hover:shadow-none hover:translate-x-[2px] hover:translate-y-[2px] shrink-0" title="Logout">
          <i data-lucide="log-out" class="w-5 h-5 lg:w-4 lg:h-4"></i>
        </a>
      </div>
    </div>
  </header>

  <main class="flex-1 w-full">
    {% block content %}{% endblock %}
  </main>

  <script>
    // Initialize standard icons
    if (typeof lucide !== 'undefined') {
      lucide.createIcons();
    }

    // Hamburger Menu Logic
    const mobileMenuBtn = document.getElementById('mobile-menu-btn');
    const retractableMenu = document.getElementById('retractable-menu');
    const menuIcon = document.getElementById('menu-icon');

    mobileMenuBtn.addEventListener('click', () => {
      // Toggle visibility
      retractableMenu.classList.toggle('hidden');
      retractableMenu.classList.toggle('flex');
      
      // Toggle icon graphic between 'menu' and 'x'
      if (retractableMenu.classList.contains('hidden')) {
        menuIcon.setAttribute('data-lucide', 'menu');
      } else {
        menuIcon.setAttribute('data-lucide', 'x');
      }
      
      // Re-render the icon change
      lucide.createIcons();
    });
  </script>

</body>
</html>
